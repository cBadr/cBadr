<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Mohamed Badr — Full-Stack Developer">
  <defs>
    <!-- Morphing gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F">
        <animate attributeName="stop-color" values="#0A192F;#0D2847;#0A192F" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#112240">
        <animate attributeName="stop-color" values="#112240;#1E3A5F;#112240" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0A192F">
        <animate attributeName="stop-color" values="#0A192F;#0F2D52;#0A192F" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Accent gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64FFDA">
        <animate attributeName="offset" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#4FC3F7">
        <animate attributeName="offset" values="0.5;0.7;0.5" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1E88E5">
        <animate attributeName="offset" values="1;0.8;1" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Subtle line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64FFDA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#64FFDA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#64FFDA" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#64FFDA" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E3A5F" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Circuit dots -->
    <pattern id="dots" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="1.2" fill="#64FFDA" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#dots)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated wave layer 1 -->
  <path fill="none" stroke="#1E88E5" stroke-width="1.5" opacity="0.4">
    <animate attributeName="d"
      values="M0,200 C200,150 400,250 600,200 C800,150 1000,250 1200,200;
              M0,200 C200,250 400,150 600,200 C800,250 1000,150 1200,200;
              M0,200 C200,150 400,250 600,200 C800,150 1000,250 1200,200"
      dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Animated wave layer 2 -->
  <path fill="none" stroke="#64FFDA" stroke-width="1" opacity="0.3">
    <animate attributeName="d"
      values="M0,220 C300,170 600,270 900,220 C1050,195 1150,205 1200,220;
              M0,220 C300,270 600,170 900,220 C1050,245 1150,195 1200,220;
              M0,220 C300,170 600,270 900,220 C1050,195 1150,205 1200,220"
      dur="12s" repeatCount="indefinite"/>
  </path>

  <!-- Floating particles -->
  <g>
    <circle r="2" fill="#64FFDA">
      <animateMotion path="M 100,350 C 300,100 600,400 1100,150" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#4FC3F7">
      <animateMotion path="M 1100,300 C 800,50 400,350 100,100" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#64FFDA">
      <animateMotion path="M 200,50 C 500,300 800,50 1000,250" dur="18s" repeatCount="indefinite" begin="-3s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="18s" repeatCount="indefinite" begin="-3s"/>
    </circle>
    <circle r="1.5" fill="#1E88E5">
      <animateMotion path="M 50,200 C 350,50 650,350 1150,180" dur="20s" repeatCount="indefinite" begin="-7s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="20s" repeatCount="indefinite" begin="-7s"/>
    </circle>
    <circle r="1.2" fill="#64FFDA">
      <animateMotion path="M 900,380 C 600,150 300,380 50,150" dur="22s" repeatCount="indefinite" begin="-5s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="22s" repeatCount="indefinite" begin="-5s"/>
    </circle>
  </g>

  <!-- Pulsing orbs (depth) -->
  <g opacity="0.15">
    <circle cx="150" cy="120" r="80" fill="#1E88E5">
      <animate attributeName="r" values="80;100;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="280" r="100" fill="#64FFDA">
      <animate attributeName="r" values="100;130;100" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.04;0.1" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main name text -->
  <g filter="url(#glow)">
    <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', 'Helvetica', sans-serif"
          font-size="84" font-weight="900" fill="url(#textGrad)" letter-spacing="6">
      MOHAMED BADR
    </text>
  </g>

  <!-- Outline text (stroke draw animation) -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', 'Helvetica', sans-serif"
        font-size="84" font-weight="900" fill="none" stroke="#64FFDA"
        stroke-width="1" stroke-dasharray="2400" stroke-dashoffset="2400" letter-spacing="6" opacity="0.7">
    MOHAMED BADR
    <animate attributeName="stroke-dashoffset" from="2400" to="0" dur="4s" fill="freeze"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" begin="4s" repeatCount="indefinite"/>
  </text>

  <!-- Accent line under name -->
  <line x1="380" y1="210" x2="820" y2="210" stroke="url(#lineGrad)" stroke-width="2">
    <animate attributeName="x1" values="600;380;600" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;820;600" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI', 'Helvetica', sans-serif"
        font-size="22" font-weight="500" fill="#CCD6F6" letter-spacing="8" opacity="0">
    FULL-STACK DEVELOPER · SaaS BUILDER · TECH ENTHUSIAST
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="1s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <g filter="url(#softGlow)">
    <text x="600" y="310" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace"
          font-size="18" font-weight="400" fill="#64FFDA" opacity="0">
      &lt;/&gt; Building digital products with cool minds &amp; warm code
      <animate attributeName="opacity" values="0;1;0.7;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Telegram highlight chip -->
  <g transform="translate(600, 350)">
    <rect x="-145" y="-22" width="290" height="38" rx="19" fill="#0088CC" opacity="0.15" stroke="#64FFDA" stroke-width="1">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#64FFDA" letter-spacing="2">
      ✈ TELEGRAM · @Idlexaz
    </text>
  </g>

  <!-- Corner decorative elements -->
  <g opacity="0.6">
    <!-- Top-left corner -->
    <path d="M 20,20 L 80,20 M 20,20 L 20,80" stroke="#64FFDA" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Top-right corner -->
    <path d="M 1180,20 L 1120,20 M 1180,20 L 1180,80" stroke="#64FFDA" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="-1s"/>
    </path>
    <!-- Bottom-left corner -->
    <path d="M 20,380 L 80,380 M 20,380 L 20,320" stroke="#64FFDA" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="-1.5s"/>
    </path>
    <!-- Bottom-right corner -->
    <path d="M 1180,380 L 1120,380 M 1180,380 L 1180,320" stroke="#64FFDA" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="-2s"/>
    </path>
  </g>

  <!-- Scanning line effect -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#64FFDA" stroke-width="1" opacity="0.3">
    <animate attributeName="y1" values="0;400;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;400;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
  </line>
</svg>
