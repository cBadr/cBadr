<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220" role="img" aria-label="Footer — Thank you for visiting">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Italiana&amp;family=Cinzel:wght@400;600&amp;family=Cormorant+Garamond:ital,wght@1,300&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      .ft-ita  { font-family: 'Italiana', 'Trajan Pro', Georgia, serif; }
      .ft-cin  { font-family: 'Cinzel', 'Trajan Pro', Georgia, serif; }
      .ft-cor  { font-family: 'Cormorant Garamond', Garamond, Georgia, serif; }
      .ft-mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    </style>

    <radialGradient id="ftBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%"   stop-color="#0A192F"/>
      <stop offset="80%"  stop-color="#020817"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="ftAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#64FFDA" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1E88E5" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#64FFDA" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#1E88E5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64FFDA" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ftTitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#4FC3F7">
        <animate attributeName="offset" values="0;0.2;0" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#1E88E5">
        <animate attributeName="offset" values="1;0.8;1" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="ftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded top -->
  <path d="M 0,40 Q 0,0 40,0 L 1240,0 Q 1280,0 1280,40 L 1280,220 L 0,220 Z" fill="url(#ftBg)"/>

  <!-- Top accent curve -->
  <path d="M 60,30 Q 320,18 640,30 T 1220,30" fill="none" stroke="url(#ftAccent)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Starfield -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="120" cy="55"  r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="85"  r="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite" begin="-1s"/></circle>
    <circle cx="400" cy="60"  r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-0.5s"/></circle>
    <circle cx="540" cy="80"  r="0.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="-2s"/></circle>
    <circle cx="740" cy="55"  r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-1.5s"/></circle>
    <circle cx="880" cy="80"  r="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite" begin="-2.5s"/></circle>
    <circle cx="1020" cy="55" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" begin="-0.8s"/></circle>
    <circle cx="1160" cy="85" r="0.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite" begin="-1.8s"/></circle>
    <circle cx="180" cy="175" r="0.9"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite" begin="-2.2s"/></circle>
    <circle cx="460" cy="195" r="0.7"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" begin="-0.6s"/></circle>
    <circle cx="820" cy="190" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-1.2s"/></circle>
    <circle cx="1100" cy="180" r="0.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite" begin="-2.7s"/></circle>
  </g>

  <!-- Drifting particles -->
  <g>
    <circle r="1.4" fill="#64FFDA">
      <animateMotion path="M 30,200 C 400,50 800,200 1250,80" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.2" fill="#4FC3F7">
      <animateMotion path="M 1250,200 C 850,50 400,200 30,80" dur="18s" repeatCount="indefinite" begin="-4s"/>
      <animate attributeName="opacity" values="0;1;0" dur="18s" repeatCount="indefinite" begin="-4s"/>
    </circle>
  </g>

  <!-- Center ornament (rounded) -->
  <g transform="translate(640, 55)" filter="url(#ftGlow)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#64FFDA" stroke-width="0.8">
      <animate attributeName="rx" values="20;24;20" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="8;6;8" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="0" r="2.5" fill="#64FFDA">
      <animate attributeName="r" values="2.5;3.8;2.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main message (Italiana, elegant) -->
  <g filter="url(#ftGlow)">
    <text x="640" y="118" text-anchor="middle" class="ft-ita"
          font-size="42" fill="url(#ftTitleGrad)" letter-spacing="18">
      THANK YOU FOR VISITING
    </text>
  </g>

  <!-- Tagline -->
  <text x="640" y="155" text-anchor="middle" class="ft-cor"
        font-size="20" font-style="italic" font-weight="300" fill="#CCD6F6" letter-spacing="4" opacity="0.85">
    Crafted with passion in the cool blue hours
  </text>

  <!-- Signature row with rounded chip -->
  <g transform="translate(640, 195)">
    <rect x="-220" y="-13" width="440" height="26" rx="13" ry="13"
          fill="#0A192F" stroke="#64FFDA" stroke-width="0.5" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" class="ft-mono" font-size="11"
          font-weight="400" fill="#8892B0" letter-spacing="6">
      &#9670; MOHAMED BADR &#9670; ANNO 2026 &#9670; @Idlexaz &#9670;
    </text>
  </g>
</svg>
