<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 60" width="1280" height="60" role="img" aria-label="Section divider">
  <defs>
    <linearGradient id="dvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#64FFDA" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#1E88E5" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#64FFDA" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#1E88E5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64FFDA" stop-opacity="0"/>
    </linearGradient>
    <filter id="dvGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft curved double line (top + bottom of a thin lens shape) -->
  <path d="M 0,30 Q 320,22 640,30 T 1280,30"
        fill="none" stroke="url(#dvGrad)" stroke-width="1.2" stroke-linecap="round" filter="url(#dvGlow)"/>
  <path d="M 0,30 Q 320,38 640,30 T 1280,30"
        fill="none" stroke="url(#dvGrad)" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Center ornament: nested rounded ellipses -->
  <g transform="translate(640, 30)" filter="url(#dvGlow)">
    <!-- Outer lens shape -->
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="none" stroke="#64FFDA" stroke-width="0.8" stroke-linecap="round">
      <animate attributeName="rx" values="22;26;22" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="9;7;9" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Inner softer ellipse -->
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#4FC3F7" stroke-width="0.6" stroke-linecap="round">
      <animate attributeName="rx" values="14;17;14" dur="3s" repeatCount="indefinite" begin="-0.4s"/>
      <animate attributeName="ry" values="5;4;5" dur="3s" repeatCount="indefinite" begin="-0.4s"/>
    </ellipse>
    <!-- Center pulse dot -->
    <circle cx="0" cy="0" r="2.5" fill="#64FFDA">
      <animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Side accent dots -->
    <circle cx="-40" cy="0" r="1.2" fill="#64FFDA" opacity="0.6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="0" r="1.2" fill="#64FFDA" opacity="0.6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="-0.8s"/>
    </circle>
  </g>

  <!-- Outer ornamental tick marks -->
  <g fill="#64FFDA" opacity="0.55">
    <circle cx="240" cy="30" r="1.1">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="30" r="1.1">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" begin="-0.5s"/>
    </circle>
    <circle cx="860" cy="30" r="1.1">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" begin="-1s"/>
    </circle>
    <circle cx="1040" cy="30" r="1.1">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" begin="-1.5s"/>
    </circle>
  </g>

  <!-- Traveling light pulse -->
  <circle cy="30" r="2.8" fill="#64FFDA" filter="url(#dvGlow)">
    <animate attributeName="cx" values="0;1280" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
