<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560" role="img" aria-label="Mohamed Badr — elegant hero">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Italiana&amp;family=Cinzel:wght@500;700&amp;family=Cormorant+Garamond:ital,wght@0,400;1,300;1,500&amp;family=JetBrains+Mono:wght@300;500&amp;display=swap');
      .ita  { font-family: 'Italiana', 'Trajan Pro', Georgia, serif; }
      .cin  { font-family: 'Cinzel', 'Trajan Pro', Georgia, serif; }
      .cor  { font-family: 'Cormorant Garamond', Garamond, Georgia, serif; }
      .mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
    </style>

    <!-- Background: soft cinematic gradient -->
    <radialGradient id="heroBg" cx="50%" cy="55%" r="80%">
      <stop offset="0%"  stop-color="#0F2D52"/>
      <stop offset="55%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>

    <!-- Title gradient: morphs through cyan→sky→teal -->
    <linearGradient id="heroTitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4FC3F7">
        <animate attributeName="offset" values="0;0.2;0" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%"  stop-color="#64FFDA">
        <animate attributeName="offset" values="0.3;0.5;0.3" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%"  stop-color="#7FFFE0">
        <animate attributeName="offset" values="0.7;0.6;0.7" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1E88E5">
        <animate attributeName="offset" values="1;0.8;1" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Ornament line gradient (fades at ends) -->
    <linearGradient id="heroLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#64FFDA" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#64FFDA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#64FFDA" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="heroGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="9" in="SourceGraphic" result="b2"/>
      <feGaussianBlur stdDeviation="18" in="SourceGraphic" result="b3"/>
      <feFlood flood-color="#64FFDA" flood-opacity="0.55" result="c1"/>
      <feComposite in="c1" in2="b1" operator="in" result="g1"/>
      <feFlood flood-color="#1E88E5" flood-opacity="0.35" result="c2"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feFlood flood-color="#4FC3F7" flood-opacity="0.18" result="c3"/>
      <feComposite in="c3" in2="b3" operator="in" result="g3"/>
      <feMerge>
        <feMergeNode in="g3"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle blur for halos -->
    <filter id="heroHalo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette mask for cinematic edges -->
    <radialGradient id="heroVignette" cx="50%" cy="50%" r="75%">
      <stop offset="65%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- ────── BACKGROUND ────── -->
  <rect width="1280" height="560" fill="url(#heroBg)"/>

  <!-- Subtle grain dots -->
  <g fill="#64FFDA" opacity="0.15">
    <circle cx="100" cy="80" r="0.8"/>
    <circle cx="180" cy="130" r="0.6"/>
    <circle cx="260" cy="60" r="0.7"/>
    <circle cx="340" cy="100" r="0.6"/>
    <circle cx="420" cy="50" r="0.8"/>
    <circle cx="500" cy="90" r="0.6"/>
    <circle cx="580" cy="120" r="0.7"/>
    <circle cx="660" cy="70" r="0.8"/>
    <circle cx="740" cy="40" r="0.6"/>
    <circle cx="820" cy="110" r="0.7"/>
    <circle cx="900" cy="90" r="0.8"/>
    <circle cx="980" cy="60" r="0.6"/>
    <circle cx="1060" cy="130" r="0.7"/>
    <circle cx="1140" cy="80" r="0.8"/>
    <circle cx="1220" cy="120" r="0.6"/>
    <circle cx="100" cy="450" r="0.8"/>
    <circle cx="250" cy="500" r="0.7"/>
    <circle cx="400" cy="480" r="0.6"/>
    <circle cx="550" cy="510" r="0.8"/>
    <circle cx="700" cy="470" r="0.7"/>
    <circle cx="850" cy="500" r="0.8"/>
    <circle cx="1000" cy="480" r="0.6"/>
    <circle cx="1150" cy="510" r="0.7"/>
  </g>

  <!-- Twinkling stars -->
  <g fill="#FFFFFF">
    <circle cx="150" cy="60"   r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="90"   r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-0.7s"/></circle>
    <circle cx="510" cy="50"   r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" begin="-1.2s"/></circle>
    <circle cx="720" cy="80"   r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" begin="-2s"/></circle>
    <circle cx="920" cy="60"   r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-1.5s"/></circle>
    <circle cx="1120" cy="100" r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" begin="-0.4s"/></circle>
    <circle cx="200" cy="490"  r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-2.3s"/></circle>
    <circle cx="450" cy="510"  r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" begin="-0.9s"/></circle>
    <circle cx="780" cy="495"  r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" begin="-1.7s"/></circle>
    <circle cx="1050" cy="490" r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" begin="-2.6s"/></circle>
  </g>

  <!-- Soft bokeh orbs (large, blurred) -->
  <g filter="url(#heroHalo)">
    <circle cx="220" cy="180" r="100" fill="#1E88E5" opacity="0.15">
      <animate attributeName="r" values="100;130;100" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1060" cy="380" r="120" fill="#64FFDA" opacity="0.10">
      <animate attributeName="r" values="120;150;120" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="140" r="80" fill="#4FC3F7" opacity="0.12">
      <animate attributeName="r" values="80;110;80" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Drifting particles -->
  <g>
    <circle r="1.5" fill="#64FFDA">
      <animateMotion path="M 50,400 C 300,200 600,500 1230,150" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.8" fill="#4FC3F7">
      <animateMotion path="M 1230,400 C 900,150 400,450 50,100" dur="20s" repeatCount="indefinite" begin="-4s"/>
      <animate attributeName="opacity" values="0;1;0" dur="20s" repeatCount="indefinite" begin="-4s"/>
    </circle>
    <circle r="1.2" fill="#7FFFE0">
      <animateMotion path="M 600,30 C 800,200 400,400 1100,500" dur="22s" repeatCount="indefinite" begin="-7s"/>
      <animate attributeName="opacity" values="0;1;0" dur="22s" repeatCount="indefinite" begin="-7s"/>
    </circle>
    <circle r="1.6" fill="#1E88E5">
      <animateMotion path="M 80,250 C 400,80 700,400 1200,200" dur="24s" repeatCount="indefinite" begin="-11s"/>
      <animate attributeName="opacity" values="0;1;0" dur="24s" repeatCount="indefinite" begin="-11s"/>
    </circle>
  </g>

  <!-- ────── ROUNDED FRAME (soft folded edges) ────── -->
  <rect x="40" y="40" width="1200" height="480" rx="40" ry="40"
        fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.7"/>
  <rect x="48" y="48" width="1184" height="464" rx="36" ry="36"
        fill="none" stroke="#64FFDA" stroke-width="0.4" opacity="0.4"/>

  <!-- Top section eyebrow -->
  <g transform="translate(640, 100)" opacity="0">
    <line x1="-130" y1="0" x2="-12" y2="0" stroke="url(#heroLine)" stroke-width="0.6"/>
    <line x1="12" y1="0" x2="130" y2="0" stroke="url(#heroLine)" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="2.5" fill="none" stroke="#64FFDA" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="1" fill="#64FFDA"/>
    <animate attributeName="opacity" from="0" to="0.8" dur="1.5s" fill="freeze"/>
  </g>

  <text x="640" y="135" text-anchor="middle" class="mono"
        font-size="11" font-weight="500" fill="#64FFDA" letter-spacing="18" opacity="0">
    PORTFOLIO &#x2022; ANNO 2026
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- ────── HERO TITLE (Italiana — ultra elegant) ────── -->
  <!-- Soft outer aura -->
  <text x="640" y="280" text-anchor="middle" class="ita"
        font-size="118" fill="#64FFDA" opacity="0.08" letter-spacing="24"
        filter="url(#heroHalo)">
    MOHAMED BADR
  </text>

  <!-- Main title -->
  <g filter="url(#heroGlow)">
    <text x="640" y="280" text-anchor="middle" class="ita"
          font-size="118" fill="url(#heroTitleGrad)" letter-spacing="24" opacity="0">
      MOHAMED BADR
      <animate attributeName="opacity" from="0" to="1" dur="2.5s" begin="0.5s" fill="freeze"/>
    </text>
  </g>

  <!-- Hairline outline for depth -->
  <text x="640" y="280" text-anchor="middle" class="ita"
        font-size="118" fill="none" stroke="#FFFFFF" stroke-width="0.25"
        letter-spacing="24" opacity="0">
    MOHAMED BADR
    <animate attributeName="opacity" values="0;0.5;0.2;0.5" dur="6s" begin="3s" repeatCount="indefinite"/>
  </text>

  <!-- ────── DECORATIVE ORNAMENT UNDER TITLE ────── -->
  <g transform="translate(640, 320)" opacity="0">
    <line x1="-280" y1="0" x2="-30" y2="0" stroke="url(#heroLine)" stroke-width="1"/>
    <line x1="30" y1="0" x2="280" y2="0" stroke="url(#heroLine)" stroke-width="1"/>
    <!-- Center diamond ornament -->
    <g>
      <circle cx="0" cy="0" r="9" fill="#0A192F" stroke="#64FFDA" stroke-width="0.8" opacity="0.95"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#64FFDA" stroke-width="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="1.5" fill="#64FFDA">
        <animate attributeName="r" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" begin="2s" fill="freeze"/>
  </g>

  <!-- ────── SUBTITLE ────── -->
  <text x="640" y="370" text-anchor="middle" class="cor"
        font-size="30" font-style="italic" font-weight="300" fill="#CCD6F6" letter-spacing="6" opacity="0">
    Full-Stack Developer &#x2022; SaaS Architect &#x2022; Digital Craftsman
    <animate attributeName="opacity" from="0" to="0.95" dur="2s" begin="2.3s" fill="freeze"/>
  </text>

  <!-- ────── PHILOSOPHY (mono code) ────── -->
  <g transform="translate(640, 415)" opacity="0">
    <text text-anchor="middle" class="mono"
          font-size="15" font-weight="300" letter-spacing="2">
      <tspan fill="#64FFDA">const</tspan><tspan fill="#CCD6F6"> philosophy </tspan><tspan fill="#4FC3F7">=</tspan><tspan fill="#7FFFE0"> &quot;build slowly &#x2022; ship boldly &#x2022; craft endlessly&quot;</tspan><tspan fill="#CCD6F6">;</tspan>
    </text>
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="3s" fill="freeze"/>
  </g>

  <!-- ────── TELEGRAM PILL (rounded) ────── -->
  <g transform="translate(640, 470)" opacity="0">
    <rect x="-170" y="-22" width="340" height="44" rx="22" ry="22"
          fill="#0088CC" fill-opacity="0.10" stroke="#64FFDA" stroke-width="1" stroke-opacity="0.65">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <g transform="translate(-128, 0)">
      <circle cx="0" cy="0" r="11" fill="#0088CC" opacity="0.3"/>
      <path d="M -7,-1 L 7,-5 L 4,7 L 1,3 L -4,5 L -2,-1 Z" fill="#64FFDA"/>
    </g>
    <text x="20" y="5" text-anchor="middle" class="mono"
          font-size="14" font-weight="500" fill="#64FFDA" letter-spacing="6">
      DM ON TELEGRAM  &#10148;  @Idlexaz
    </text>
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="3.5s" fill="freeze"/>
  </g>

  <!-- ────── SOFT CORNER ORNAMENTS (curved) ────── -->
  <g stroke="#64FFDA" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65">
    <path d="M 80,70 Q 70,70 70,80 L 70,100">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 70,80 L 110,70" opacity="0.5"/>
    <path d="M 1200,70 Q 1210,70 1210,80 L 1210,100">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="-0.7s"/>
    </path>
    <path d="M 1210,80 L 1170,70" opacity="0.5"/>
    <path d="M 80,490 Q 70,490 70,480 L 70,460">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="-1.4s"/>
    </path>
    <path d="M 70,480 L 110,490" opacity="0.5"/>
    <path d="M 1200,490 Q 1210,490 1210,480 L 1210,460">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="-2.1s"/>
    </path>
    <path d="M 1210,480 L 1170,490" opacity="0.5"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1280" height="560" fill="url(#heroVignette)" pointer-events="none"/>
</svg>
